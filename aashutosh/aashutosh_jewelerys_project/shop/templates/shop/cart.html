{% extends 'shop/base.html' %}
{% block content %}

<div class="container mx-auto py-10 px-6">
  <h2 class="text-3xl font-bold mb-6 text-gray-800">Your Shopping Cart</h2>

  {% if cart_items %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      {% for item in cart_items %}
      <div class="flex items-center border p-4 rounded-2xl shadow-sm">
        <img src="{{ item.product.image.url }}" alt="{{ item.product.name }}" class="w-24 h-24 object-cover rounded-lg">
        <div class="ml-4 flex-1">
          <h3 class="font-semibold text-lg">{{ item.product.name }}</h3>
          <p class="text-yellow-600 font-medium">₹{{ item.product.price }}</p>
          <p class="text-sm text-gray-500">Qty: {{ item.quantity }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <p class="text-gray-600">Your cart is currently empty.</p>
  {% endif %}
</div>

{% endblock %}
