{# shop/products_grid.html #}
{% for product in products %}
<div class="col-xl-3 col-lg-4 col-md-6 col-sm-6">
    <div class="card product-card h-100 shadow-sm border-0 rounded-4 overflow-hidden transition-hover">
        <div class="position-relative overflow-hidden">
            <img src="{{ product.image.url }}" class="card-img-top product-image" alt="{{ product.name }}">
            {% if product.badge != 'NONE' %}
            <span class="position-absolute top-0 start-0 m-2 badge badge-{{ product.get_badge_color }}">
                {{ product.get_badge_display }}
            </span>
            {% endif %}
        </div>
        <div class="card-body d-flex flex-column">
            <h5 class="card-title mb-1">{{ product.name }}</h5>
            <p class="card-text text-muted small mb-1">{{ product.color }}</p>
            <p class="card-text fw-bold text-gold mb-2 mt-0">₹{{ product.price }}</p>
            <div class="mt-auto">
                <a href="{% url 'product_detail' product.pk %}" class="btn btn-gold w-100">View Details</a>
            </div>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12 text-center py-5">
    <h4>No products found</h4>
    <p class="text-muted">Try adjusting your filters</p>
</div>
{% endfor %}
