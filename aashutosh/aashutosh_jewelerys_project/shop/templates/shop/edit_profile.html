{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h4 class="mb-4 text-center fw-bold">Edit Profile</h4>

          <form method="POST" novalidate>
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
              <label for="id_username" class="form-label fw-semibold">Username</label>
              <input 
                type="text" 
                id="id_username" 
                name="username" 
                value="{{ user.username }}" 
                class="form-control form-control-lg rounded-3" 
                required>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="id_email" class="form-label fw-semibold">Email</label>
              <input 
                type="email" 
                id="id_email" 
                name="email" 
                value="{{ user.email }}" 
                class="form-control form-control-lg rounded-3" 
                required>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between align-items-center mt-4">
              <a href="{% url 'profile' %}" class="btn btn-outline-secondary px-4">Cancel</a>
              <button type="submit" class="btn btn-dark px-4">Save Changes</button>
            </div>
          </form>

          <!-- Signature -->
          <div class="text-center mt-4">
            <small class="crafted-signature">
              <span class="crafted-label">Crafted by</span>
              <span class="signature-name"> Vrushabh Gillarkar ✨</span>
            </small>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- Styling -->
<style>
  /* ===== Form Inputs ===== */
  input[type="text"],
  input[type="email"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ced4da;
    border-radius: 8px;
    font-size: 15px;
  }

  input:focus {
    outline: none;
    border-color: #212529;
    box-shadow: 0 0 0 0.15rem rgba(33, 37, 41, 0.25);
  }

  /* ===== Signature Styling ===== */
  .crafted-signature {
    display: inline-block;
    font-size: 0.95rem;
    margin-top: 15px;
  }

  .crafted-label {
    font-weight: 700;
    color: #000;
  }

  .signature-name {
    font-weight: 600;
    background: linear-gradient(90deg, #f4b942, #c471ed, #f64f59);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-style: normal;
  }

  /* ===== Mobile Responsiveness ===== */
  @media (max-width: 576px) {
    .card-body {
      padding: 1.5rem;
    }

    h4 {
      font-size: 1.25rem;
    }

    button, a.btn {
      width: 48%;
      font-size: 0.9rem;
    }

    .crafted-signature {
      font-size: 0.85rem;
    }
  }
</style>
{% endblock %}
