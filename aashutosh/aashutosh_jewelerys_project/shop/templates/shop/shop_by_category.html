{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<section class="py-5 bg-light">
  <div class="container">
    <h2 class="text-center mb-5 fw-bold text-uppercase text-gold">Shop by Category</h2>
    <div class="row g-4 justify-content-center">
      {% for category in categories %}
      <div class="col-md-4 col-lg-3">
        <a href="{% url 'category_subcategories' category.id %}" class="text-decoration-none">
          <div class="card border-0 shadow-lg rounded-4 overflow-hidden h-100 category-card">
            <img src="{{ category.image.url }}" class="card-img-top" alt="{{ category.name }}">
            <div class="card-body text-center bg-white">
              <h5 class="card-title text-dark fw-semibold mt-2">{{ category.name }}</h5>
              <p class="small text-muted mb-0">Explore exclusive {{ category.name }} designs</p>
            </div>
          </div>
        </a>
      </div>
      {% empty %}
      <p class="text-center">No categories available.</p>
      {% endfor %}
    </div>
  </div>
</section>

<style>
.text-gold { color: #b1976b; }
.category-card img { height: 240px; object-fit: cover; transition: 0.4s ease; }
.category-card:hover img { transform: scale(1.07); filter: brightness(0.9); }
.category-card:hover .card-body { background: #fff8e6; }
</style>
{% endblock %}
