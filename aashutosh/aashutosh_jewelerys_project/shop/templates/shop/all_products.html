{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<section class="py-5 bg-light">
  <div class="container">
    <h2 class="text-center mb-5 fw-bold text-uppercase text-gold">All Products</h2>
    <div class="row g-4">
      {% for product in products %}
      <div class="col-md-4 col-lg-3">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100">
          <a href="{% url 'product_detail' product.id %}" class="text-decoration-none">
            <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
            <div class="card-body text-center bg-white">
              <h6 class="fw-semibold text-dark">{{ product.name }}</h6>
              <p class="text-muted mb-0">₹{{ product.price }}</p>
            </div>
          </a>
        </div>
      </div>
      {% empty %}
      <p class="text-center">No products found.</p>
      {% endfor %}
    </div>
  </div>
</section>

<style>
.text-gold { color: #b1976b; }
.card img { height: 240px; object-fit: cover; transition: 0.4s ease; }
.card:hover img { transform: scale(1.05); filter: brightness(0.9); }
</style>
{% endblock %}
