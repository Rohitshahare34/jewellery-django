{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<div class="container mx-auto px-6 py-10">
  <h2 class="text-3xl font-bold mb-6 text-gray-800">Search Results for "{{ query }}"</h2>

  {% if results %}
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-8">
    {% for product in results %}
    <div class="bg-white rounded-2xl shadow hover:shadow-xl overflow-hidden transition-all duration-300">
      <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-64 object-cover">
      <div class="p-4 text-center">
        <h3 class="font-semibold text-lg">{{ product.name }}</h3>
        <p class="text-yellow-600 font-bold mt-2">₹{{ product.price }}</p>
        <a href="{% url 'product_detail' product.id %}" class="inline-block mt-3 px-4 py-2 bg-yellow-500 text-black font-semibold rounded-full hover:bg-yellow-400 transition">
          View Details
        </a>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-gray-600">No products found matching your search.</p>
  {% endif %}
</div>
{% endblock %}
